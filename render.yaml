services:
  - type: web
    name: task-manager-api
    runtime: docker
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        fromService:
          type: web
          name: task-manager-api
          property: host
      - key: DB_CONNECTION
        value: postgresql
      - key: DB_PORT
        value: 5432
    databases:
      - name: task_manager_db
        databaseName: task_manager_db
        user: task_manager_user
